langcode: en
status: true
dependencies: {  }
id: aspace_ead_migration_media
class: null
field_plugin_method: null
cck_plugin_method: null
migration_tags: null
migration_group: aspace_ead_migration
label: 'Migration ArchivesSpace EAD to Media entities'
source:
  plugin: aspace_file_source
  object_type: resources
  constants:
    aspace_ead_dir: 'private://findingaid'
process:
  status:
    plugin: default_value
    default_value: 1

  field_media_file/target_id:
    plugin: get_xml_file
    source: 
      - file_uri
      - file_name
      - file_mime
      - repo_id
      - xml_path
  name:
    plugin: concat
    source:
      - xml_title
      - file_name
  field_media_file/display:
    plugin: default_value
    default_value: 1
destination:
  plugin: 'entity:media'
  default_bundle: findingaid
migration_dependencies: null
